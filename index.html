<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aesthetic Live Blur</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        /* CSS ini biar nggak gepeng */
        canvas {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Ini kunci biar gak gepeng */
            transform: scaleX(-1); /* Efek cermin */
        }
    </style>
</head>
<body>
    <video class="input_video" playsinline style="display:none;"></video>
    <canvas class="output_canvas"></canvas>

    <script>
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Set ukuran canvas dinamis biar pas layar HP
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;

            let isPeace = false;
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexUp = landmarks[8].y < landmarks[6].y;
                const middleUp = landmarks[12].y < landmarks[10].y;
                const ringDown = landmarks[16].y > landmarks[14].y;
                const pinkyDown = landmarks[20].y > landmarks[18].y;
                if (indexUp && middleUp && ringDown && pinkyDown) isPeace = true;
            }

            // Gambar dasar
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // Logika Blur Live
            if (isPeace) {
                canvasCtx.globalAlpha = 0.4; 
                canvasCtx.drawImage(results.image, 15, 15, canvasElement.width, canvasElement.height);
                canvasCtx.drawImage(results.image, -15, -15, canvasElement.width, canvasElement.height);
                canvasCtx.globalAlpha = 1.0; 
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then((stream) => {
            videoElement.srcObject = stream;
            videoElement.play();
            function frame() {
                hands.send({image: videoElement});
                requestAnimationFrame(frame);
            }
            frame();
        });
    </script>
</body>
</html>
