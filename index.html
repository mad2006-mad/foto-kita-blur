<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        
        .vid-wrapper { position: fixed; width: 100vw; height: 100vh; }
        
        #video-original, #video-blur { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scaleX(-1); position: absolute; top: 0; left: 0;
        }
        
        /* Video kedua ini yang akan di-blur */
        #video-blur { 
            filter: blur(20px) brightness(1.2) contrast(1.5);
            opacity: 0; 
            transition: opacity 0.4s ease; 
        }
        
        .active { opacity: 1 !important; }
        
        /* UI Overlay */
        #overlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border-radius: 30px; border: none; }
        #btn-reset { position: fixed; bottom: 20px; right: 20px; z-index: 999; padding: 10px 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; border-radius: 20px; display: none; }
    </style>
</head>
<body>

    <div id="overlay"><button id="btn-start" class="btn">MULAI ✨</button></div>
    <button id="btn-reset">Reset Audio ↺</button>
    <audio id="audio" src="lagu.mp3" loop></audio>
    
    <div class="vid-wrapper">
        <video id="video-original" playsinline autoplay></video>
        <video id="video-blur" playsinline autoplay></video>
    </div>

    <script>
        const vOriginal = document.getElementById('video-original');
        const vBlur = document.getElementById('video-blur');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                if (l[8].y < l[6].y && l[12].y < l[10].y) vBlur.classList.add('active');
                else vBlur.classList.remove('active');
            } else {
                vBlur.classList.remove('active');
            }
        });

        document.getElementById('btn-start').onclick = async () => {
            document.getElementById('overlay').remove();
            document.getElementById('btn-reset').style.display = 'block';
            document.getElementById('audio').play();
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            // Gunakan stream yang sama untuk dua video
            vOriginal.srcObject = stream;
            vBlur.srcObject = stream;
            
            async function frame() {
                await hands.send({image: vOriginal});
                requestAnimationFrame(frame);
            }
            frame();
        };

        document.getElementById('btn-reset').onclick = () => { document.getElementById('audio').currentTime = 0; document.getElementById('audio').play(); };
    </script>
</body>
</html>
