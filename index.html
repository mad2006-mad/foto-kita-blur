<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #container { width: 100vw; height: 100vh; transition: 0.3s; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Efek Blur */
        .blur-mode { filter: blur(15px) brightness(1.2) contrast(1.5); }
        
        /* UI Overlay */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border-radius: 50px; border: none; }
        
        #btn-reset { position: absolute; bottom: 20px; right: 20px; padding: 10px 20px; z-index: 101; display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="btn-start" class="btn">MULAI ✨</button>
    </div>
    <button id="btn-reset" class="btn">Reset Audio ↺</button>
    
    <audio id="audio" src="lagu.mp3" loop></audio>
    
    <div id="container">
        <video id="video" playsinline></video>
    </div>
    
    <script>
        const container = document.getElementById('container');
        const video = document.getElementById('video');
        const audio = document.getElementById('audio');
        const startBtn = document.getElementById('btn-start');
        const resetBtn = document.getElementById('btn-reset');
        const uiLayer = document.getElementById('ui-layer');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                if (l[8].y < l[6].y && l[12].y < l[10].y) {
                    container.classList.add('blur-mode');
                } else {
                    container.classList.remove('blur-mode');
                }
            } else {
                container.classList.remove('blur-mode');
            }
        });

        startBtn.onclick = async () => {
            try {
                // Sembunyikan semua UI
                uiLayer.style.display = 'none';
                resetBtn.style.display = 'block';
                
                audio.play();
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.play();
                
                async function frame() {
                    await hands.send({image: video});
                    requestAnimationFrame(frame);
                }
                frame();
            } catch (e) { alert("Izin kamera ditolak!"); }
        };

        resetBtn.onclick = () => {
            audio.currentTime = 0;
            audio.play();
        };
    </script>
</body>
</html>
