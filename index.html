<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aesthetic Live Blur</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1); /* Efek cermin */
        }
    </style>
</head>
<body>
    <video class="input_video" playsinline autoplay muted style="display:none;"></video>
    <canvas class="output_canvas"></canvas>

    <script>
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // PENTING: Set ukuran canvas SEKALI SAJA di awal
        function setupCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', setupCanvas);
        setupCanvas();

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Gambar frame kamera
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // Deteksi Peace
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                const isPeace = (l[8].y < l[6].y && l[12].y < l[10].y && l[16].y > l[14].y && l[20].y > l[18].y);
                
                if (isPeace) {
                    // Efek Ghosting/Blur
                    canvasCtx.globalAlpha = 0.4; 
                    canvasCtx.drawImage(results.image, 20, 20, canvasElement.width, canvasElement.height);
                    canvasCtx.drawImage(results.image, -20, -20, canvasElement.width, canvasElement.height);
                    canvasCtx.globalAlpha = 1.0; 
                }
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then((stream) => {
            videoElement.srcObject = stream;
            videoElement.play();
            function frame() {
                hands.send({image: videoElement});
                requestAnimationFrame(frame);
            }
            frame();
        })
        .catch(err => alert("Kamera tidak bisa diakses: " + err));
    </script>
</body>
</html>
