<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        /* Video disembunyikan, hanya jadi sumber data */
        #video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        /* Canvas menjadi layar utama */
        #output { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        
        #overlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; color: white; }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border-radius: 30px; border: none; }
        #btn-reset { position: fixed; bottom: 20px; right: 20px; z-index: 999; padding: 10px 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; border-radius: 20px; display: none; }
    </style>
</head>
<body>

    <div id="overlay"><button id="btn-start" class="btn">MULAI ✨</button></div>
    <button id="btn-reset">Reset Audio ↺</button>
    <audio id="audio" src="lagu.mp3" loop></audio>
    <video id="video" playsinline autoplay muted></video>
    <canvas id="output"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('audio');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            // Pastikan ukuran canvas sesuai layar
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cek apakah ada gambar hasil deteksi
            if (results.image) {
                let isAesthetic = false;
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const l = results.multiHandLandmarks[0];
                    if (l[8].y < l[6].y && l[12].y < l[10].y) isAesthetic = true;
                }
        
                // Terapkan filter
                ctx.filter = isAesthetic ? 'blur(8px) brightness(1.2) saturate(1.5)' : 'none';
                
                // Gambar ke canvas
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            }
        });

        document.getElementById('btn-start').onclick = async () => {
            document.getElementById('overlay').remove();
            document.getElementById('btn-reset').style.display = 'block';
            audio.play();
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            
            async function frame() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    await hands.send({image: video});
                }
                requestAnimationFrame(frame);
            }
            frame();
        };

        document.getElementById('btn-reset').onclick = () => { audio.currentTime = 0; audio.play(); };
    </script>
</body>
</html>
