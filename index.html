<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Debug Camera</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #log { position: absolute; top: 10px; left: 10px; color: yellow; font-size: 12px; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>
    <div id="log">Loading...</div>
    <video id="v" style="display:none;"></video>
    <canvas id="c"></canvas>

    <script>
        const log = document.getElementById('log');
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');

        async function init() {
            try {
                log.innerText = "Requesting camera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                v.srcObject = stream;
                v.play();
                log.innerText = "Camera active. Drawing...";
                
                function draw() {
                    c.width = window.innerWidth;
                    c.height = window.innerHeight;
                    ctx.drawImage(v, 0, 0, c.width, c.height);
                    requestAnimationFrame(draw);
                }
                draw();
            } catch (e) {
                log.innerText = "Error: " + e.message;
            }
        }
        init();
    </script>
</body>
</html>
