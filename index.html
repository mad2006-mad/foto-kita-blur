<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        
        #video { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            transform: scaleX(-1); /* Efek Cermin */
            transition: filter 0.5s ease; /* Transisi halus saat ganti filter */
        }
        
        /* Efek Aesthetic: Blur, Terang, Saturasi, dan Kontras */
        .aesthetic-mode { 
            filter: blur(8px) brightness(1.3) saturate(2) contrast(1.2);
        }
        
        #overlay { 
            position: fixed; top:0; left:0; width: 100vw; height: 100vh; 
            background: #000; display: flex; justify-content: center; 
            align-items: center; z-index: 1000; 
        }
        .btn { 
            padding: 20px 40px; font-size: 20px; cursor: pointer; 
            border-radius: 30px; border: none; background: #fff; color: #000;
        }
        #btn-reset { 
            position: fixed; bottom: 20px; right: 20px; z-index: 999; 
            padding: 10px 20px; background: rgba(255,255,255,0.2); 
            color: white; border: 1px solid white; border-radius: 20px; display: none; 
        }
    </style>
</head>
<body>

    <div id="overlay"><button id="btn-start" class="btn">MULAI ✨</button></div>
    <button id="btn-reset">Reset Audio ↺</button>
    <audio id="audio" src="lagu.mp3" loop></audio>
    <video id="video" playsinline autoplay muted></video>

    <script>
        const video = document.getElementById('video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        // Optimasi agar deteksi lebih ringan
        hands.setOptions({ 
            maxNumHands: 1, 
            minDetectionConfidence: 0.5, 
            minTrackingConfidence: 0.5 
        });

        // Logika Deteksi
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                // Deteksi 2 Jari (Peace Sign): Jari telunjuk (8) & tengah (12) di atas sendi
                const isPeace = (l[8].y < l[6].y && l[12].y < l[10].y);
                
                if (isPeace) {
                    video.classList.add('aesthetic-mode');
                } else {
                    video.classList.remove('aesthetic-mode');
                }
            } else {
                video.classList.remove('aesthetic-mode');
            }
        });

        // Event Klik Mulai
        document.getElementById('btn-start').onclick = async () => {
            document.getElementById('overlay').remove();
            document.getElementById('btn-reset').style.display = 'block';
            
            const audio = document.getElementById('audio');
            audio.play().catch(e => console.log("Audio diblokir oleh browser"));
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                
                // Loop proses frame
                async function frame() {
                    if (video.readyState >= 2) await hands.send({image: video});
                    requestAnimationFrame(frame);
                }
                frame();
            } catch (err) {
                alert("Kamera tidak bisa diakses: " + err.message);
            }
        };

        // Reset Audio
        document.getElementById('btn-reset').onclick = () => { 
            const audio = document.getElementById('audio');
            audio.currentTime = 0; 
            audio.play(); 
        };
    </script>
</body>
</html>
