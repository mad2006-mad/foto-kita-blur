<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Cam with Music</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        .blur { filter: blur(15px) brightness(1.2) contrast(1.5); }
        
        /* Gaya Tombol */
        .btn { position: absolute; padding: 15px 30px; background: white; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; z-index: 20; }
        #btn-reset { bottom: 20px; right: 20px; background: rgba(255,255,255,0.3); color: white; }
    </style>
</head>
<body>

    <button id="btn-start" class="btn">Mulai Kamera & Musik ✨</button>
    <button id="btn-reset" class="btn" style="display:none;">Reset Lagu ↺</button>
    
    <audio id="myAudio" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <video id="video" playsinline></video>

    <script>
        const video = document.getElementById('video');
        const audio = document.getElementById('myAudio');
        const startBtn = document.getElementById('btn-start');
        const resetBtn = document.getElementById('btn-reset');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                if (l[8].y < l[6].y && l[12].y < l[10].y) video.classList.add('blur');
                else video.classList.remove('blur');
            } else {
                video.classList.remove('blur');
            }
        });

        // Tombol Start
        startBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.play();
            audio.play();
            
            startBtn.style.display = 'none';
            resetBtn.style.display = 'block';
            
            async function frame() {
                await hands.send({image: video});
                requestAnimationFrame(frame);
            }
            frame();
        };

        // Tombol Reset
        resetBtn.onclick = () => {
            audio.currentTime = 0;
            audio.play();
        };
    </script>
</body>
</html>
