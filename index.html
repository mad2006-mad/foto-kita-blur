<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
    body { margin: 0; background: #000; overflow: hidden; }
    /* Bungkus video dalam container */
    #container { width: 100vw; height: 100vh; transition: 0.3s; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    
    /* Efek blur diberikan ke CONTAINER, bukan ke VIDEO */
    .blur-mode {
        filter: blur(15px) brightness(1.2) contrast(1.5);
    }
    
    .btn { position: absolute; padding: 20px 40px; font-size: 20px; z-index: 100; cursor: pointer; }
    #status { position: absolute; top: 10px; color: white; z-index: 99; }
</style>
</head>
<body>
    <div id="status">Klik tombol untuk mulai...</div>
    <button id="btn" class="btn">MULAI ✨</button>
    <audio id="audio" src="lagu.mp3" loop></audio>
    
    <div id="container">
        <video id="video" playsinline></video>
    </div>
    <script>
        const container = document.getElementById('container');
        const video = document.getElementById('video');
        const audio = document.getElementById('audio');
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                if (l[8].y < l[6].y && l[12].y < l[10].y) {
                    container.classList.add('blur-mode'); // Tambah ke container
                    status.innerText = "Pose Terdeteksi: BLUR ON";
                } else {
                    container.classList.remove('blur-mode');
                    status.innerText = "Pose Lepas: BLUR OFF";
                }
            } else {
                container.classList.remove('blur-mode');
            }
        });

        btn.onclick = async () => {
            try {
                // Paksa audio load dan play
                await audio.load();
                await audio.play();
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.play();
                
                btn.style.display = 'none';
                
                async function frame() {
                    await hands.send({image: video});
                    requestAnimationFrame(frame);
                }
                frame();
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        };
    </script>
</body>
</html>
