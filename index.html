<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body { margin: 0; background: #000; }
        #video { 
            width: 100vw; height: 100vh; object-fit: cover; 
            transform: scaleX(-1); transition: 0.3s;
        }
        .blur { filter: blur(20px); }
        #btn { position: absolute; z-index: 10; padding: 20px; }
    </style>
</head>
<body>
    <button id="btn">MULAI</button>
    <video id="video" playsinline></video>
    <audio id="audio" src="lagu.mp3" loop></audio>

    <script>
        const video = document.getElementById('video');
        const audio = document.getElementById('audio');
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                if (l[8].y < l[6].y && l[12].y < l[10].y) video.classList.add('blur');
                else video.classList.remove('blur');
            } else {
                video.classList.remove('blur');
            }
        });

        document.getElementById('btn').onclick = async () => {
            document.getElementById('btn').style.display = 'none';
            audio.play();
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.play();
            
            async function frame() {
                await hands.send({image: video});
                requestAnimationFrame(frame);
            }
            frame();
        };
    </script>
</body>
</html>
