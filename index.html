<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnosa Kamera</title>
</head>
<body>
    <div id="status" style="padding: 20px; background: yellow;">Mencoba akses kamera...</div>
    <video id="v" playsinline autoplay muted style="width:100%; border:5px solid red;"></video>

    <script>
        const status = document.getElementById('status');
        const v = document.getElementById('v');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            v.srcObject = stream;
            status.innerText = "Kamera Berhasil! Jika layar di bawah masih hitam, artinya HP tidak mengizinkan akses ke elemen video.";
        })
        .catch(err => {
            status.innerText = "GAGAL: " + err.message;
        });
    </script>
</body>
</html>
