<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        
        /* Video langsung diberi filter agar lebih pasti */
        #video { 
            width: 100vw; height: 100vh; object-fit: cover; 
            transform: scaleX(-1); transition: filter 0.3s ease;
        }
        
        .blur-mode { filter: blur(15px) brightness(1.2) contrast(1.5); }
        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: flex; justify-content: center; align-items: center; 
        }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border-radius: 30px; border: none; }
        
        /* Tombol Reset Transparan */
        #btn-reset { 
            position: fixed; bottom: 20px; right: 20px; z-index: 999; 
            padding: 10px 20px; background: rgba(255,255,255,0.2); 
            color: white; border: 1px solid white; border-radius: 20px;
            backdrop-filter: blur(5px); cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-start" class="btn">MULAI ✨</button>
    </div>
    
    <button id="btn-reset">Reset Audio ↺</button>
    <audio id="audio" src="lagu.mp3" loop></audio>
    
    <video id="video" playsinline></video>
    
    <script>
        const video = document.getElementById('video');
        const audio = document.getElementById('audio');
        const overlay = document.getElementById('overlay');
        const resetBtn = document.getElementById('btn-reset');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            // Deteksi 2 jari
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                if (l[8].y < l[6].y && l[12].y < l[10].y) {
                    video.classList.add('blur-mode');
                } else {
                    video.classList.remove('blur-mode');
                }
            } else {
                video.classList.remove('blur-mode');
            }
        });

        document.getElementById('btn-start').onclick = async () => {
            try {
                overlay.remove();
                resetBtn.style.display = 'block';
                
                audio.play();
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.play();
                
                async function frame() {
                    await hands.send({image: video});
                    requestAnimationFrame(frame);
                }
                frame();
            } catch (e) { alert("Izin kamera gagal!"); }
        };

        resetBtn.onclick = () => { audio.currentTime = 0; audio.play(); };
    </script>
</body>
</html>
