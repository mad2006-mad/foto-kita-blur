<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Blur</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        /* Video langsung ditampilkan */
        #video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
        }
        /* Efek blur estetik pakai CSS (sangat ringan) */
        .blur-active {
            filter: blur(10px) brightness(1.2) contrast(1.5);
        }
    </style>
</head>
<body>

    <video id="video" playsinline autoplay></video>

    <script>
        const video = document.getElementById('video');
        
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        
        hands.onResults((results) => {
            // DEBUG: Cek di console browser HP kalau kamu buka lewat remote debug
            // console.log(results.multiHandLandmarks); 

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                
                // Mari kita buat logika deteksinya lebih "longgar" 
                // Biar lebih mudah terdeteksi di HP
                const indexUp = l[8].y < l[6].y;
                const middleUp = l[12].y < l[10].y;
                
                if (indexUp && middleUp) {
                    video.classList.add('blur-active');
                } else {
                    video.classList.remove('blur-active');
                }
            } else {
                // Jika tidak ada tangan, pastikan blur mati
                video.classList.remove('blur-active');
            }
        });

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                async function frame() {
                    await hands.send({image: video});
                    requestAnimationFrame(frame);
                }
                frame();
            } catch (e) { alert("Izin kamera gagal!"); }
        }
        start();
    </script>
</body>
</html>
